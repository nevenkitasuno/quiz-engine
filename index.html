<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Folders</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="page-header">
        <div>
          <p class="eyebrow">Static quiz website</p>
          <h1>Quiz Folders</h1>
          <p class="subtitle">Browse quiz folders from text files, then open a folder to see its quizzes.</p>
        </div>
      </header>

      <section class="panel controls controls--single">
        <label class="field">
          <span>Search folders by name</span>
          <input id="search-input" type="search" placeholder="Type part of a folder name" />
        </label>
      </section>

      <section class="panel">
        <div class="table-meta">
          <p id="results-summary">Loading folders...</p>
          <button id="reset-filters" class="secondary-button" type="button">Reset search</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Folder</th>
                <th>Quizzes</th>
              </tr>
            </thead>
            <tbody id="folder-table-body"></tbody>
          </table>
        </div>

        <p id="empty-state" class="empty-state" hidden>No folders match the current search.</p>
      </section>
    </main>

    <script src="./main.js" defer></script>
  </body>
</html>
