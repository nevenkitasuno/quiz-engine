<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Folder Quizzes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="topbar" data-language-switcher></div>
      <p><a class="back-link" href="./index.html" data-i18n="backToFolders">← Back to folders</a></p>

      <header class="page-header">
        <div>
          <p class="eyebrow" data-i18n="folderEyebrow">Quiz folder</p>
          <h1 id="folder-title">Loading...</h1>
          <p class="subtitle" data-i18n="folderSubtitle">Filter quizzes by name and date, then start any quiz.</p>
        </div>
      </header>

      <p id="folder-error" class="empty-state" hidden></p>

      <section id="folder-content" hidden>
        <section class="panel controls">
          <label class="field">
            <span data-i18n="searchByName">Search by name</span>
            <input id="search-input" type="search" data-i18n-placeholder="searchQuizzesPlaceholder" placeholder="Type part of a quiz name" />
          </label>

          <label class="field">
            <span data-i18n="fromDate">From date</span>
            <input id="date-from" type="date" />
          </label>

          <label class="field">
            <span data-i18n="toDate">To date</span>
            <input id="date-to" type="date" />
          </label>

          <label class="field">
            <span data-i18n="sortByDate">Sort by date</span>
            <select id="sort-order">
              <option value="desc" data-i18n="newestFirst">Newest first</option>
              <option value="asc" data-i18n="oldestFirst">Oldest first</option>
            </select>
          </label>
        </section>

        <section class="panel">
          <div class="table-meta">
            <p id="results-summary">Loading quizzes...</p>
            <button id="reset-filters" class="secondary-button" type="button" data-i18n="resetFilters">Reset filters</button>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th data-i18n="dateColumn">Date</th>
                  <th data-i18n="quizNameColumn">Quiz name</th>
                </tr>
              </thead>
              <tbody id="quiz-table-body"></tbody>
            </table>
          </div>

          <p id="empty-state" class="empty-state" hidden data-i18n="noQuizzes">No quizzes match the current filters.</p>

          <footer class="pagination">
            <button id="prev-page" class="secondary-button" type="button" data-i18n="previous">Previous</button>
            <span id="page-label">Page 1</span>
            <button id="next-page" class="secondary-button" type="button" data-i18n="next">Next</button>
          </footer>
        </section>
      </section>
    </main>

    <script src="./translations.js" defer></script>
    <script src="./i18n.js" defer></script>
    <script src="./folder.js" defer></script>
  </body>
</html>
